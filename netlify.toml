[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/css/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    
  for = "/js/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

  for = "/*.html"
    [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
