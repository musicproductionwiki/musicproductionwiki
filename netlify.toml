[build]
  publish = "."
  command = "echo 'build complete'"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude-proxy"
  status = 200
  force = true

[[redirects]]
  from = "/dictionary/*"
  to = "/bible/:splat"
  status = 301

[[redirects]]
  from   = "/ssl-2-plus-review/"
  to     = "/articles/ssl-2-plus-review.html"
  status = 301

[[redirects]]
  from   = "/ssl-2-plus-review"
  to     = "/articles/ssl-2-plus-review.html"
  status = 301
